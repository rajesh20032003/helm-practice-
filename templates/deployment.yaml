apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: {{ .Release.Name }}-{{ .Chart.Name}}
spec: 
  replicas: {{ .Values.replica }}
  selector:
    matchLabels: 
      app: {{ .Release.Name }}
      release: {{ .Release.Name }}
  template: 
    metadata:
      labels:
        app: {{ .Release.Name }}
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: nginx 
          image: {{ .Values.image.name }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.image.containerPort }}