{{ if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata: 
  name: {{ .Release.Name }}-{{ .Chart.Name}}-svc
spec: 
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}
    release: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.image.containerPort }}
{{ end }}


   